name: Build YouTube-Free

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact: YouTube-Free-Windows
            ffmpeg_url: https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
            ffmpeg_bin: ffmpeg-master-latest-win64-gpl/bin
          - os: macos-latest
            name: macOS
            artifact: YouTube-Free-macOS
            ffmpeg_url: https://evermeet.cx/ffmpeg/getrelease/zip
            ffmpeg_bin: .

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ffmpeg 정적 바이너리 다운로드 → backend/ffmpeg_bin/에 저장
      - name: Download ffmpeg (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          curl -L -o ffmpeg.zip "${{ matrix.ffmpeg_url }}"
          unzip ffmpeg.zip
          mkdir -p backend/ffmpeg_bin
          cp ${{ matrix.ffmpeg_bin }}/ffmpeg.exe backend/ffmpeg_bin/
          cp ${{ matrix.ffmpeg_bin }}/ffprobe.exe backend/ffmpeg_bin/

      - name: Download ffmpeg (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          curl -L -o ffmpeg.zip "${{ matrix.ffmpeg_url }}"
          unzip ffmpeg.zip
          mkdir -p backend/ffmpeg_bin
          cp ffmpeg backend/ffmpeg_bin/
          chmod +x backend/ffmpeg_bin/ffmpeg
          # ffprobe 별도 다운로드
          curl -L -o ffprobe.zip "https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip"
          unzip -o ffprobe.zip
          cp ffprobe backend/ffmpeg_bin/
          chmod +x backend/ffmpeg_bin/ffprobe

      # 프론트엔드 빌드
      - name: Build Frontend
        working-directory: frontend
        run: |
          npm install
          npx vite build

      # 빌드된 프론트엔드를 backend/static으로 복사
      - name: Copy Frontend Build
        shell: bash
        run: cp -r frontend/dist backend/static

      # 백엔드 의존성 + PyInstaller
      - name: Install Backend Dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      # PyInstaller 빌드
      - name: Build with PyInstaller
        working-directory: backend
        run: pyinstaller youtube-free.spec --noconfirm

      # 아티팩트 업로드
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: backend/dist/YouTube-Free/
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Windows Build
        uses: actions/download-artifact@v4
        with:
          name: YouTube-Free-Windows
          path: YouTube-Free-Windows

      - name: Download macOS Build
        uses: actions/download-artifact@v4
        with:
          name: YouTube-Free-macOS
          path: YouTube-Free-macOS

      - name: Zip Artifacts
        run: |
          cd YouTube-Free-Windows && zip -r ../YouTube-Free-Windows.zip . && cd ..
          cd YouTube-Free-macOS && zip -r ../YouTube-Free-macOS.zip . && cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            YouTube-Free-Windows.zip
            YouTube-Free-macOS.zip
          generate_release_notes: true
