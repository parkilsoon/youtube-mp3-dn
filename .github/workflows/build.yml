name: Build YouTube-Free

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact: YouTube-Free-Windows
          - os: macos-latest
            name: macOS
            artifact: YouTube-Free-macOS

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ffmpeg (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install ffmpeg -y

      - name: Install ffmpeg (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install ffmpeg

      # 프론트엔드 빌드
      - name: Build Frontend
        working-directory: frontend
        run: |
          npm install
          npx vite build

      # 빌드된 프론트엔드를 backend/static으로 복사
      - name: Copy Frontend Build
        shell: bash
        run: cp -r frontend/dist backend/static

      # 백엔드 의존성 + PyInstaller
      - name: Install Backend Dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      # PyInstaller 빌드
      - name: Build with PyInstaller
        working-directory: backend
        run: pyinstaller youtube-free.spec --noconfirm

      # 아티팩트 업로드
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: backend/dist/YouTube-Free/
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Windows Build
        uses: actions/download-artifact@v4
        with:
          name: YouTube-Free-Windows
          path: YouTube-Free-Windows

      - name: Download macOS Build
        uses: actions/download-artifact@v4
        with:
          name: YouTube-Free-macOS
          path: YouTube-Free-macOS

      - name: Zip Artifacts
        run: |
          cd YouTube-Free-Windows && zip -r ../YouTube-Free-Windows.zip . && cd ..
          cd YouTube-Free-macOS && zip -r ../YouTube-Free-macOS.zip . && cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            YouTube-Free-Windows.zip
            YouTube-Free-macOS.zip
          generate_release_notes: true
